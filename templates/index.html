<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống Tóm Tắt Văn bản</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{

width:1100px;
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
padding:25px;

}

/* LOGO */

.logo{
text-align:center;
margin-bottom:5px;
}

.logo img{
width:70px;
}

/* TITLE */

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* CONTENT */

.content{
display:flex;
gap:25px;
}

/* BOX */

.box{
flex:1;
display:flex;
flex-direction:column;
}

.box h2{
margin-bottom:8px;
color:#444;
}

/* TEXTAREA */

textarea{

height:220px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
font-size:14px;

}

textarea:focus{
border-color:#667eea;
outline:none;
box-shadow:0 0 6px rgba(102,126,234,0.4);
}

/* RESULT */

.result-box{

height:220px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
background:#f3f4f6;
overflow-y:auto;

}

/* FILE */

.file-area{
margin-top:15px;
font-size:14px;
}

/* BUTTON */

.buttons{

display:flex;
justify-content:center;
gap:20px;
margin-top:20px;

}

button{

width:150px;
padding:10px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-size:15px;
cursor:pointer;

}

button:hover{
background:#5a67d8;
}

.clear{

background:#e53e3e;

}

.clear:hover{

background:#c53030;

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="{{ url_for('static', filename='logo.png') }}">
</div>

<h1>Hệ thống Tóm Tắt Văn bản</h1>

<form method="POST" enctype="multipart/form-data">

<div class="content">

<!-- LEFT -->

<div class="box">

<h2>Văn bản gốc</h2>

<textarea name="text" placeholder="Nhập văn bản cần tóm tắt...">{{ original_text }}</textarea>

<div class="file-area">

<label>Chọn file (.txt, .docx)</label><br>
<input type="file" name="file">

</div>

</div>

<!-- RIGHT -->

<div class="box">

<h2>Kết quả tóm tắt</h2>

<div class="result-box">

{% if summary %}
{{ summary }}
{% else %}
Vui lòng nhập nội dung hoặc chọn file.
{% endif %}

</div>

</div>

</div>

<div class="buttons">

<button type="submit">Tóm tắt</button>

<button type="button" class="clear" onclick="clearForm()">Làm mới</button>

</div>

</form>

</div>

<script>

function clearForm(){

document.querySelector("textarea").value="";
document.querySelector(".result-box").innerHTML="Vui lòng nhập nội dung hoặc chọn file.";
document.querySelector("input[type=file]").value="";

}

</script>

</body>
</html>
